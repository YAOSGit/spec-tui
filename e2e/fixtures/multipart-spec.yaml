openapi: "3.0.3"
info:
  title: Upload API
  version: "1.0.0"
servers:
  - url: https://upload.example.com
paths:
  /upload:
    post:
      summary: Upload a file
      operationId: uploadFile
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              properties:
                file:
                  type: string
                  format: binary
                description:
                  type: string
      responses:
        "200":
          description: Upload successful
  /items:
    get:
      summary: List items
      operationId: listItems
      parameters:
        - name: status
          in: query
          schema:
            type: string
            enum:
              - active
              - inactive
              - pending
        - name: page
          in: query
          schema:
            type: integer
      responses:
        "200":
          description: A list of items
          content:
            application/json:
              schema:
                type: array
                items:
                  type: object
                  properties:
                    id:
                      type: integer
                    name:
                      type: string
